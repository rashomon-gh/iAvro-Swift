name: Build

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project iAvro-Swift.xcodeproj \
            -scheme "iAvro-Swift" \
            -configuration Debug \
            clean build
